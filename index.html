<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMI JIRA Issue Tracker (Cloud Sync)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 1200px; }
        .bg-open { background-color: #dc3545 !important; color: white !important; }
        .bg-closed { background-color: #198754 !important; color: white !important; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body class="container mt-5">
    <div id="loading" class="loading-overlay"><div class="spinner-border text-primary"></div></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">AMI JIRA Issue Tracker</h2>
        <span class="badge bg-primary">Cloud Sync (Google Sheets)</span>
    </div>
    
    <!-- 新增 Issue 表單 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3 fw-bold">新增 Issue</h5>
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select id="statusInput" class="form-select">
                        <option value="Open">Open</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Function</label>
                    <input type="text" id="functionInput" class="form-control" list="funcList" placeholder="選擇或輸入...">
                    <datalist id="funcList">
                        <option value="BIOS"><option value="BMC"><option value="Unknown">
                    </datalist>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Jira Number</label>
                    <input type="text" id="jiraInput" class="form-control" placeholder="JIRA-1234">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Issue Title</label>
                    <input type="text" id="titleInput" class="form-control" placeholder="Issue Title">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Link</label>
                    <input type="url" id="linkInput" class="form-control" placeholder="https://...">
                </div>
                <div class="col-12 text-end">
                    <button onclick="addIssue()" class="btn btn-primary px-4">新增 Issue</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Issue 列表 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th width="120">Status</th>
                        <th width="120">Function</th>
                        <th width="150">Jira Number</th>
                        <th>Issue Title</th>
                        <th width="100" class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="issueList">
                    <tr><td colspan="5" class="text-center py-4">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://api.sheetbest.com/sheets/9c41cfc2-9062-4a4d-8aef-92ad37b5e5a8";
        let issues = [];

        async function fetchIssues() {
            showLoading(true);
            try {
                const response = await fetch(API_URL);
                issues = await response.json();
                renderIssues();
            } catch (error) {
                console.error("Error fetching issues:", error);
                alert("無法讀取雲端資料，請檢查 API 連結或試算表權限。");
            }
            showLoading(false);
        }

        function renderIssues() {
            const list = document.getElementById('issueList');
            list.innerHTML = '';
            
            if (!issues || issues.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">目前沒有 Issue 資料</td></tr>';
                return;
            }

            issues.forEach((issue, index) => {
                const row = `
                    <tr>
                        <td>
                            <select onchange="updateStatus(${index}, this.value)" class="form-select form-select-sm d-inline-block w-auto ${issue.status === 'Open' ? 'bg-open' : 'bg-closed'}">
                                <option value="Open" class="bg-white text-dark" ${issue.status === 'Open' ? 'selected' : ''}>Open</option>
                                <option value="Closed" class="bg-white text-dark" ${issue.status === 'Closed' ? 'selected' : ''}>Closed</option>
                            </select>
                        </td>
                        <td>${issue.function || '-'}</td>
                        <td><code>${issue.jira_number}</code></td>
                        <td><a href="${issue.link}" target="_blank" class="text-decoration-none">${issue.title}</a></td>
                        <td class="text-center">
                            <button onclick="deleteIssue(${index})" class="btn btn-outline-danger btn-sm">刪除</button>
                        </td>
                    </tr>
                `;
                list.innerHTML += row;
            });
        }

        async function addIssue() {
            const newIssue = {
                status: document.getElementById('statusInput').value,
                function: document.getElementById('functionInput').value,
                jira_number: document.getElementById('jiraInput').value,
                title: document.getElementById('titleInput').value,
                link: document.getElementById('linkInput').value
            };
            
            if(!newIssue.jira_number || !newIssue.title || !newIssue.link) return alert('請填寫必填欄位！');

            showLoading(true);
            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify([newIssue])
                });
                await fetchIssues();
                // Clear inputs
                document.getElementById('jiraInput').value = '';
                document.getElementById('titleInput').value = '';
                document.getElementById('linkInput').value = '';
                document.getElementById('functionInput').value = '';
            } catch (error) {
                alert("新增失敗，請稍後再試。");
            }
            showLoading(false);
        }

        async function updateStatus(index, newStatus) {
            showLoading(true);
            try {
                await fetch(`${API_URL}/${index}`, {
                    method: "PATCH",
                    mode: "cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: newStatus })
                });
                issues[index].status = newStatus;
                renderIssues();
            } catch (error) {
                alert("更新狀態失敗。");
                fetchIssues();
            }
            showLoading(false);
        }

        async function deleteIssue(index) {
            if(!confirm('確定要從雲端刪除此案件嗎？')) return;
            showLoading(true);
            try {
                await fetch(`${API_URL}/${index}`, { method: "DELETE" });
                await fetchIssues();
            } catch (error) {
                alert("刪除失敗。");
            }
            showLoading(false);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        fetchIssues();
    </script>
</body>
</html>
