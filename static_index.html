<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMI JIRA Issue Tracker (Static-GitHub Pages)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 1200px; }
        .bg-open { background-color: #dc3545 !important; color: white !important; }
        .bg-closed { background-color: #198754 !important; color: white !important; }
        .form-select-sm { font-size: 0.875rem; }
    </style>
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">AMI JIRA Issue Tracker</h2>
        <span class="badge bg-success">Static Mode (LocalStorage)</span>
    </div>
    
    <!-- 新增 Issue 表單 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3 fw-bold">新增 Issue</h5>
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select id="statusInput" class="form-select">
                        <option value="Open">Open</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Function</label>
                    <input type="text" id="functionInput" class="form-control" list="funcList" placeholder="選擇或輸入...">
                    <datalist id="funcList">
                        <option value="BIOS">
                        <option value="BMC">
                        <option value="Unknown">
                    </datalist>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Jira Number</label>
                    <input type="text" id="jiraInput" class="form-control" placeholder="JIRA-1234">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Issue Title</label>
                    <input type="text" id="titleInput" class="form-control" placeholder="Issue Title">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Link</label>
                    <input type="url" id="linkInput" class="form-control" placeholder="https://...">
                </div>
                <div class="col-12 text-end">
                    <button onclick="addIssue()" class="btn btn-primary px-4">新增 Issue</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Issue 列表 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th width="120">Status</th>
                        <th width="120">Function</th>
                        <th width="150">Jira Number</th>
                        <th>Issue Title</th>
                        <th width="150" class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="issueList">
                    <!-- JavaScript 動態渲染 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 分頁器 (Static 版簡易分頁) -->
    <nav id="paginationNav" class="mt-4 d-none">
        <ul class="pagination justify-content-center" id="paginationUl">
        </ul>
    </nav>

    <script>
        let issues = JSON.parse(localStorage.getItem('jira_issues')) || [];
        let currentPage = 1;
        const perPage = 15;

        function renderIssues() {
            const list = document.getElementById('issueList');
            list.innerHTML = '';
            
            if (issues.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">目前沒有 Issue 資料</td></tr>';
                document.getElementById('paginationNav').classList.add('d-none');
                return;
            }

            const totalPages = Math.ceil(issues.length / perPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const paginatedIssues = issues.slice(start, end);

            paginatedIssues.forEach((issue, pIndex) => {
                const globalIndex = start + pIndex;
                const row = `
                    <tr>
                        <td>
                            <select onchange="updateStatus(${globalIndex}, this.value)" class="form-select form-select-sm d-inline-block w-auto ${issue.status === 'Open' ? 'bg-open' : 'bg-closed'}">
                                <option value="Open" class="bg-white text-dark" ${issue.status === 'Open' ? 'selected' : ''}>Open</option>
                                <option value="Closed" class="bg-white text-dark" ${issue.status === 'Closed' ? 'selected' : ''}>Closed</option>
                            </select>
                        </td>
                        <td>${issue.function || '-'}</td>
                        <td><code>${issue.jira}</code></td>
                        <td><a href="${issue.link}" target="_blank" class="text-decoration-none">${issue.title}</a></td>
                        <td class="text-center">
                            <button onclick="deleteIssue(${globalIndex})" class="btn btn-outline-danger btn-sm">刪除</button>
                        </td>
                    </tr>
                `;
                list.innerHTML += row;
            });

            renderPagination(totalPages);
            localStorage.setItem('jira_issues', JSON.stringify(issues));
        }

        function renderPagination(totalPages) {
            const nav = document.getElementById('paginationNav');
            const ul = document.getElementById('paginationUl');
            ul.innerHTML = '';

            if (totalPages <= 1) {
                nav.classList.add('d-none');
                return;
            }

            nav.classList.remove('d-none');
            
            // Previous
            ul.innerHTML += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一頁</a></li>`;
            
            // Numbers
            for (let i = 1; i <= totalPages; i++) {
                ul.innerHTML += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
            }

            // Next
            ul.innerHTML += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一頁</a></li>`;
        }

        function changePage(p) {
            currentPage = p;
            renderIssues();
        }

        function addIssue() {
            const newIssue = {
                status: document.getElementById('statusInput').value,
                function: document.getElementById('functionInput').value,
                jira: document.getElementById('jiraInput').value,
                title: document.getElementById('titleInput').value,
                link: document.getElementById('linkInput').value
            };
            if(!newIssue.jira || !newIssue.title || !newIssue.link) return alert('請填寫必填欄位 (Jira Number, Title, Link)！');
            
            issues.push(newIssue);
            renderIssues();
            
            // Reset fields
            document.getElementById('jiraInput').value = '';
            document.getElementById('titleInput').value = '';
            document.getElementById('linkInput').value = '';
            document.getElementById('functionInput').value = '';
        }

        function updateStatus(index, newStatus) {
            issues[index].status = newStatus;
            renderIssues();
        }

        function deleteIssue(index) {
            if(confirm('確定要刪除嗎？')) {
                issues.splice(index, 1);
                renderIssues();
            }
        }

        // 初始渲染
        renderIssues();
    </script>
</body>
</html>
